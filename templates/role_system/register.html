{% extends 'base.html' %}

{% block title %}
  register
{% endblock %}

{% block content %}
  <div class="flex justify-center m-6">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-3xl font-bold text-center text-green-600 mb-6">Create Account</h2>

      <form>
        <!-- user name -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">username</label>
          <input type="text" name="username" placeholder="Enter your name" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <!-- Name -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Full Name</label>
          <input type="text" name="fullname" placeholder="Enter your name" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Email</label>
          <input type="email" name="email" placeholder="Enter email" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <!-- Profile Picture -->
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">Profile Picture</label>
          <input type="file" name="profile_photo" accept="image/*" class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Password</label>
          <input type="password" name="password" placeholder="Enter password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Confirm Password</label>
          <input type="password" name="re_password" placeholder="Confirm password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500" />
        </div>

        <!-- Button -->
        <button class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition">Submit</button>
      </form>

      <p class="text-center text-sm mt-6">
        Already have an account?
        <a href="{% url 'login' %}" class="text-green-600 hover:underline">Login</a>
      </p>
    </div>
  </div>
{% endblock %}
