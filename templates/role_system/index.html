{% extends 'base.html' %}

{% block title %}
  Role Based System
{% endblock %}

{% block content %}
  <!-- ================= HERO SECTION ================= -->
  <section class="flex-grow flex items-center justify-center text-center">
    <div class="max-w-2xl">
      <h2 class="text-4xl font-bold text-gray-800 mb-4">Role Based Authentication System</h2>

      <p class="text-gray-600 mb-8">Simple template for Admin, Recruiter and Job Seeker dashboard system.</p>

      <div class="space-x-4">
        <button class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700">Admin Panel</button>

        <button class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700">Recruiter Dashboard</button>

        <button class="bg-purple-600 text-white px-6 py-3 rounded hover:bg-purple-700">Job Seeker Dashboard</button>
      </div>
    </div>
  </section>
{% endblock %}
