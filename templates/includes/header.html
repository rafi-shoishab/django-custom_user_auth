<header class="bg-white shadow">
  <div class="container mx-auto px-6 py-4 flex justify-between items-center">

    <!-- Logo -->
    <h1 class="text-2xl font-bold text-blue-600">RoleSystem</h1>

    <!-- Menu -->
    <nav class="space-x-6">
      <a href="{% url 'home' %}" class="text-gray-700 hover:text-blue-600">Home</a>
      <a href="#" class="text-gray-700 hover:text-blue-600">About</a>
      <a href="#" class="text-gray-700 hover:text-blue-600">Contact</a>
      
      {% if user.is_authenticated %}
        {% if user.is_superuser %}
          <a href="#" class="text-gray-700 hover:text-blue-600">Admin Panel</a>
        {% elif user.role == 'employer' %}
          <a href="#" class="text-gray-700 hover:text-green-600">Employer Dashboard</a>
        {% else %}
          <a href="#" class="text-gray-700 hover:text-purple-600">User Dashboard</a>
        {% endif %}
      {% endif %}
    </nav>

    <!-- Auth Buttons -->
    <div class="space-x-3">
      {% if user.is_authenticated %}
        <a href="#" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Profile</a>
        <a href="{% url 'logout' %}" class="px-4 py-2 bg-red-200 rounded hover:bg-red-300">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Login</a>
        <a href="{% url 'register' %}" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Register</a>
      {% endif %}
    </div>

  </div>
</header>
